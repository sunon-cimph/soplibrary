<!DOCTYPE html>
<html>
<head>
    <title>SOP Library</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container-fluid">
        <span class="navbar-brand">SOP Library</span>

        <button class="btn btn-danger">
            Logout
        </button>
    </div>
</nav>

<div class="container mt-4">

    <div class="card">
        <div class="card-header">
            Add SOP
        </div>

        <div class="card-body">

            <div class="row">

                <div class="col-md-2">
                    <input type="text" class="form-control" placeholder="Sequence">
                </div>

                <div class="col-md-3">
                    <input type="text" class="form-control" placeholder="Process Name">
                </div>

                <div class="col-md-2">
                    <input type="text" class="form-control" placeholder="Scope">
                </div>

                <div class="col-md-1">
                    <input type="text" class="form-control" placeholder="Version">
                </div>

                <div class="col-md-2">
                    <input type="text" class="form-control" placeholder="Owner">
                </div>

                <div class="col-md-2">
                    <input type="text" class="form-control" placeholder="File Link">
                </div>

            </div>

            <button class="btn btn-success mt-3">
                Save SOP
            </button>

        </div>
    </div>

    <div class="card mt-4">

        <div class="card-header">
            SOP Records
        </div>

        <div class="card-body">

            <table class="table table-bordered table-striped">

                <thead>
                    <tr>
                        <th>Sequence</th>
                        <th>Process Name</th>
                        <th>Scope</th>
                        <th>Version</th>
                        <th>Owner</th>
                        <th>Link</th>
                        <th width="150">Action</th>
                    </tr>
                </thead>

                <tbody>

                    <tr>
                        <td>001</td>
                        <td>Receiving</td>
                        <td>Warehouse</td>
                        <td>1.0</td>
                        <td>Vincent</td>

                        <td>
                            <a href="#" class="btn btn-primary btn-sm">
                                Download
                            </a>
                        </td>

                        <td>
                            <button class="btn btn-warning btn-sm">
                                Edit
                            </button>

                            <button class="btn btn-danger btn-sm">
                                Delete
                            </button>
                        </td>
                    </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
